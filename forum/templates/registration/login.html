{% extends 'forum/base.html' %}

{% block title %}Login{% endblock %}

{% block head %}
<style>
    :root {
        --bg-main: #0d1117;
        --bg-card: #161b22;
        --border-color: #30363d;
        --text-main: #c9d1d9;
        --text-muted: #8b949e;
        --accent: #58a6ff;
        --btn-bg: #238636;
        --btn-hover: #2ea043;
    }

    body {
        background-color: var(--bg-main);
        color: var(--text-main);
    }

    /* Push below fixed navbar */
    .auth-wrapper {
        margin-top: 100px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .auth-container {
        width: 340px;
        padding: 25px;
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    }

    h2 {
        font-weight: 400;
        margin-bottom: 20px;
        text-align: center;
    }

    form p {
        display: flex;
        flex-direction: column;
        margin-bottom: 16px;
        font-size: 14px;
    }

    input[type="text"], 
    input[type="password"], 
    input[type="email"] {
        margin-top: 6px;
        padding: 8px 12px;
        font-size: 14px;
        background-color: #0d1117;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        color: var(--text-main);
    }

    input:focus {
        border-color: var(--accent);
        outline: none;
        box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
    }

    button {
        width: 100%;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        color: white;
        background-color: var(--btn-bg);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s ease;
    }

    button:hover {
        background-color: var(--btn-hover);
    }

    .footer-link {
        margin-top: 20px;
        padding: 15px;
        width: 340px;
        text-align: center;
        font-size: 14px;
        border: 1px solid var(--border-color);
        border-radius: 10px;
        background-color: var(--bg-card);
        color: var(--text-muted);
    }

    a {
        color: var(--accent);
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <h2>Login</h2>
    
    <div class="auth-container">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Sign in</button>
        </form>
    </div>

    <div class="footer-link">
        No account? <a href="{% url 'register' %}">Create an account</a>.
    </div>
</div>
{% endblock %}
