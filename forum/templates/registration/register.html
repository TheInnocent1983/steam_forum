<style>
    :root {
        --color-canvas-subtle: #f6f8fa;
        --color-border-default: #d0d7de;
        --color-btn-bg: #1f883d;
        --color-btn-text: #ffffff;
        --color-accent-fg: #0969da;
        --color-danger-fg: #cf222e;
        --color-danger-subtle: #ffebe9;
        --body-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body {
        background-color: var(--color-canvas-subtle);
        font-family: var(--body-font);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 40px;
        margin: 0;
    }

    .auth-container {
        width: 400px; /* Slightly wider for registration details */
        padding: 24px;
        background-color: #ffffff;
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
    }

    h2 {
        font-size: 24px;
        font-weight: 300;
        margin-bottom: 20px;
        text-align: center;
    }

    .field-wrapper {
        margin-bottom: 16px;
    }

    label {
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
        font-size: 14px;
    }

    /* Target Django form widgets */
    input[type="text"], 
    input[type="password"], 
    input[type="email"],
    select {
        width: 100%;
        box-sizing: border-box;
        padding: 5px 12px;
        font-size: 14px;
        line-height: 20px;
        border: 1px solid var(--color-border-default);
        border-radius: 6px;
        outline: none;
    }

    input:focus {
        border-color: var(--color-accent-fg);
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3);
    }

    .help-text {
        font-size: 12px;
        color: #57606a;
        margin-top: 4px;
    }

    .error-list {
        color: var(--color-danger-fg);
        font-size: 12px;
        margin-top: 4px;
        list-style: none;
        padding-left: 0;
    }

    .non-field-errors {
        background-color: var(--color-danger-subtle);
        color: var(--color-danger-fg);
        padding: 12px;
        border: 1px solid rgba(255, 129, 130, 0.4);
        border-radius: 6px;
        margin-bottom: 16px;
        font-size: 14px;
    }

    button {
        width: 100%;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 600;
        color: var(--color-btn-text);
        background-color: var(--color-btn-bg);
        border: 1px solid rgba(27, 31, 36, 0.15);
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background-color: #1a7f37;
    }
</style>

<h2>Register</h2>

<div class="auth-container">
    <form method="post">
        {% csrf_token %}

        {% if form.non_field_errors %}
            <div class="non-field-errors">
                {{ form.non_field_errors }}
            </div>
        {% endif %}

        {% for field in form %}
            <div class="field-wrapper">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}

                {% if field.help_text %}
                    <div class="help-text">
                        {{ field.help_text|safe }}
                    </div>
                {% endif %}

                {% if field.errors %}
                    <div class="error-list">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit">Create account</button>
    </form>
</div>
