<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'game_list' %}">Все игры</a></li>
            <li class="breadcrumb-item active">{{ game.name }}</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>{{ game.name }}</h1>
        <button class="btn btn-success">Создать тему</button>
    </div>

    <div class="list-group shadow-sm">
        <div class="list-group-item bg-light fw-bold">Темы обсуждения</div>
        {% for topic in game.topics.all %}
            <a href="{% url 'topic_detail' topic.pk %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                <div>
                    <span class="h6 mb-0">{{ topic.title }}</span>
                    <div class="small text-muted">Автор: {{ topic.author }}</div>
                </div>
                <span class="badge bg-secondary rounded-pill">{{ topic.comments.count }} ответов</span>
            </a>
        {% empty %}
            <div class="list-group-item text-center text-muted">Здесь пока нет тем. Станьте первым!</div>
        {% endfor %}
    </div>
</div>
