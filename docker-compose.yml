version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: steam_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: steam_db
      POSTGRES_USER: steamuser
      POSTGRES_PASSWORD: steampass123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steamuser -d steam_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: steam_django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

